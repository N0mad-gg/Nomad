services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nomad
      POSTGRES_PASSWORD: nomad
      POSTGRES_DB: nomad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
